<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>paranoa233's notes</title>
  <meta
    name="description"
    content="一个以黑白灰为主、适合长期整理 Markdown 与公式的笔记站。"
  >
  <meta name="theme-color" content="#141414">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="./assets/style.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      chtml: {
        scale: 1,
        matchFontHeight: false
      }
    };
  </script>
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <h1>paranoa233's notes</h1>
      </div>

      <label class="search-box" for="search-input">
        <span>搜索笔记</span>
        <input id="search-input" type="search" placeholder="标题、摘要、标签">
      </label>

      <section class="tag-panel">
        <div class="panel-head">
          <h2>标签</h2>
          <span id="note-count">0 篇</span>
        </div>
        <div id="tag-list" class="tag-list"></div>
      </section>

      <section class="note-panel">
        <div class="panel-head">
          <h2>目录</h2>
          <span id="active-note-date"></span>
        </div>
        <nav id="note-list" class="note-list" aria-label="笔记目录"></nav>
      </section>
    </aside>

    <main class="content">
      <section class="article-shell">
        <header class="article-header">
          <p id="article-date" class="article-date"></p>
          <h1 id="article-title" class="article-title">正在载入笔记...</h1>
          <div id="article-tags" class="article-tags"></div>
        </header>
        <article id="article" class="article-body" aria-live="polite"></article>
        <div id="article-nav" class="article-nav"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script src="./assets/app.js" defer></script>
</body>
</html>
