<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xu Notes</title>
  <meta name="description" content="一个托管在 GitHub Pages 上的 Markdown 笔记站。">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="./assets/style.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <p class="eyebrow">GitHub Pages Notes</p>
        <h1>Xu Notes</h1>
        <p class="brand-copy">
          一个适合长期沉淀 Markdown 笔记的小站，支持分类、检索、代码块和数学公式。
        </p>
      </div>

      <label class="search-box" for="search-input">
        <span>搜索笔记</span>
        <input id="search-input" type="search" placeholder="标题、摘要、标签">
      </label>

      <section class="tag-panel">
        <div class="panel-head">
          <h2>标签</h2>
          <span id="note-count">0 篇</span>
        </div>
        <div id="tag-list" class="tag-list"></div>
      </section>

      <section class="note-panel">
        <div class="panel-head">
          <h2>目录</h2>
          <span id="active-note-date"></span>
        </div>
        <nav id="note-list" class="note-list" aria-label="笔记目录"></nav>
      </section>
    </aside>

    <main class="content">
      <section class="hero">
        <div>
          <p class="eyebrow">你的公开知识卡片盒</p>
          <h2 id="hero-title">正在载入笔记...</h2>
          <p id="hero-summary" class="hero-summary">
            页面会自动渲染 Markdown 内容，并在 GitHub Pages 上直接展示。
          </p>
        </div>
        <div class="hero-badge">
          <span>Zero Build</span>
          <span>Markdown First</span>
          <span>Math Ready</span>
        </div>
      </section>

      <section class="article-shell">
        <div class="article-meta">
          <div id="article-tags" class="article-tags"></div>
          <a class="source-link" href="./README.md" target="_blank" rel="noreferrer">查看部署说明</a>
        </div>
        <article id="article" class="article-body" aria-live="polite"></article>
        <div id="article-nav" class="article-nav"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="./assets/app.js" defer></script>
</body>
</html>
