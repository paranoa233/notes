<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>paranoa233's notes</title>
  <meta
    name="description"
    content="paranoa233 的笔记主页，只展示文章列表，点开进入独立阅读页。"
  >
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body class="home-page">
  <div class="site-shell">
    <header class="site-header">
      <a class="site-title" href="./index.html">paranoa233's notes</a>
    </header>

    <main class="home-layout">
      <aside class="home-sidebar">
        <label class="panel search-panel" for="search-input">
          <span class="panel-label">搜索</span>
          <input id="search-input" type="search" placeholder="标题、摘要、标签">
        </label>

        <section class="panel tag-panel">
          <div class="panel-head">
            <h2>标签</h2>
            <span id="note-count">0 篇</span>
          </div>
          <div id="tag-list" class="tag-list"></div>
        </section>

        <section class="panel collection-panel">
          <div class="panel-head">
            <h2>专题书架</h2>
            <span id="collection-count">0 部</span>
          </div>
          <div id="collection-list" class="collection-list" aria-live="polite"></div>
        </section>
      </aside>

      <section class="panel library-panel">
        <div class="panel-head">
          <h2>文章</h2>
        </div>
        <div id="note-list" class="note-list" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script src="./assets/app.js?v=20260413-4" defer></script>
</body>
</html>
