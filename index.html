<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>paranoa233's notes</title>
  <meta
    name="description"
    content="一个以黑白灰为主、适合长期整理 Markdown 与公式的笔记站。"
  >
  <meta name="theme-color" content="#141414">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="./assets/style.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      chtml: {
        scale: 1,
        matchFontHeight: false
      }
    };
  </script>
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <p class="eyebrow">Personal Notebook</p>
        <h1>paranoa233's notes</h1>
        <p class="brand-copy">
          一个偏向专注阅读的 Markdown 笔记站，主色调是黑白灰，文章和公式尽量靠近 Typora 的阅读感。
        </p>
      </div>

      <label class="search-box" for="search-input">
        <span>搜索笔记</span>
        <input id="search-input" type="search" placeholder="标题、摘要、标签">
      </label>

      <section class="tag-panel">
        <div class="panel-head">
          <h2>标签</h2>
          <span id="note-count">0 篇</span>
        </div>
        <div id="tag-list" class="tag-list"></div>
      </section>

      <section class="note-panel">
        <div class="panel-head">
          <h2>目录</h2>
          <span id="active-note-date"></span>
        </div>
        <nav id="note-list" class="note-list" aria-label="笔记目录"></nav>
      </section>
    </aside>

    <main class="content">
      <section class="hero">
        <div>
          <p class="eyebrow">Focused Reading</p>
          <h2 id="hero-title">打开一篇笔记，安静地读下去。</h2>
          <p id="hero-summary" class="hero-summary">
            点开目录中的文章后，正文会以更接近 Typora 的排版呈现，公式、列表、引用和代码块都会保持清晰。
          </p>
        </div>
        <div class="hero-badge">
          <span>Mobile Ready</span>
          <span>Monochrome</span>
          <span>Math Friendly</span>
        </div>
      </section>

      <section class="article-shell">
        <div class="article-meta">
          <div id="article-tags" class="article-tags"></div>
          <a class="source-link" href="./README.md" target="_blank" rel="noreferrer">站点说明</a>
        </div>
        <article id="article" class="article-body" aria-live="polite"></article>
        <div id="article-nav" class="article-nav"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script src="./assets/app.js" defer></script>
</body>
</html>
