<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>paranoa233's notes</title>
  <meta
    name="description"
    content="paranoa233 的独立文章阅读页，采用白纸黑字的阅读模式。"
  >
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="./assets/style.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
</head>
<body class="note-page">
  <header class="reader-topbar">
    <div class="reader-topbar-inner">
      <a class="back-link" href="./index.html">返回主页</a>
      <a class="site-title compact" href="./index.html">paranoa233's notes</a>
    </div>
  </header>

  <main class="reader-main">
    <section class="reader-paper">
      <header class="article-header">
        <p id="article-date" class="article-date"></p>
        <h1 id="article-title" class="article-title">正在载入文章...</h1>
        <div id="article-tags" class="article-tags"></div>
      </header>

      <nav id="article-toc" class="article-toc is-hidden" aria-label="文章目录"></nav>
      <article id="article" class="article-body" aria-live="polite"></article>
      <div id="article-nav" class="article-nav"></div>
    </section>
  </main>

  <script src="./assets/vendor/marked.min.js?v=20260413-4"></script>
  <script src="./assets/vendor/purify.min.js?v=20260413-4"></script>
  <script src="./assets/vendor/highlight.common.min.js?v=20260413-4"></script>
  <script id="MathJax-script" defer src="./assets/vendor/mathjax/tex-svg.js?v=20260413-4"></script>
  <script src="./assets/note.js?v=20260413-4" defer></script>
</body>
</html>
